# ============================================================================
# GitHub Actions workflow — Build Astro + Deploy to GitHub Pages
#
# WHAT THIS DOES:
#   1. Triggers on every push to `main`
#   2. Checks out the code
#   3. Installs dependencies (npm ci)
#   4. Builds the Astro site (npm run build) → produces dist/ folder
#   5. Uploads dist/ as a GitHub Pages artifact
#   6. Deploys that artifact to GitHub Pages
#
# The Supabase URL and anon key are injected as environment variables
# from GitHub Secrets so they're never in the repo.
# ============================================================================

name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only allow one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: ${{ secrets.PUBLIC_SUPABASE_URL }}
          PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
